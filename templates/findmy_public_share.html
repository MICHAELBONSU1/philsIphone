<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My - Shared Device Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .share-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .access-form {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: 0.2s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s ease;
            margin-top: 20px;
        }

        .button:hover {
            background: #5568d3;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .info-box {
            background: #e7f5ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            color: #1c3a70;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }

        .info-box.show {
            display: block;
        }

        .info-box.success {
            background: #d3f9d8;
            border-left-color: #51cf66;
            color: #2b8a3e;
        }

        .info-box.error {
            background: #ffe0e0;
            border-left-color: #ff6b6b;
            color: #7f2722;
        }

        .access-granted {
            text-align: center;
            display: none;
        }

        .access-granted.show {
            display: block;
        }

        .access-granted-icon {
            font-size: 4rem;
            color: #51cf66;
            margin-bottom: 20px;
            animation: bounceIn 0.6s ease;
        }

        .access-granted h2 {
            font-size: 1.5rem;
            color: #2b8a3e;
            margin-bottom: 15px;
        }

        .access-granted-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-weight: 500;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .access-link {
            background: #667eea;
            color: white;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            text-align: center;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .access-link:hover {
            background: #5568d3;
        }

        .error-screen {
            text-align: center;
            display: none;
        }

        .error-screen.show {
            display: block;
        }

        .error-icon {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .error-screen h2 {
            font-size: 1.5rem;
            color: #7f2722;
            margin-bottom: 15px;
        }

        .error-screen p {
            color: #666;
            margin-bottom: 20px;
        }

        .back-button {
            background: #6c757d;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .back-button:hover {
            background: #5a6268;
        }

        .expiration-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 6px;
            color: #856404;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .expiration-warning.show {
            display: block;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .share-container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="share-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📍</div>
            <h1>Find My Phone</h1>
            <p>Access a shared device with a public code</p>
        </div>

        <!-- Info Box -->
        <div class="info-box" id="info-box"></div>

        <!-- Access Form -->
        <div id="access-form-section">
            <div class="access-form">
                <div class="form-group">
                    <label for="share-code">Share Code</label>
                    <input 
                        type="text" 
                        id="share-code" 
                        placeholder="e.g., ABC123" 
                        maxlength="10"
                        onkeyup="this.value = this.value.toUpperCase()"
                    />
                </div>

                <div class="form-group" id="password-group" style="display: none;">
                    <label for="share-password">Password (if required)</label>
                    <input 
                        type="password" 
                        id="share-password" 
                        placeholder="Enter password"
                    />
                </div>

                <button class="button" onclick="submitShareCode()">
                    <i class="fas fa-arrow-right me-2"></i> Access Device
                </button>
            </div>

            <p style="font-size: 0.85rem; color: #666; text-align: center;">
                Enter the share code provided by the device owner
            </p>
        </div>

        <!-- Access Granted -->
        <div class="access-granted" id="access-granted-section">
            <div class="access-granted-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Access Granted!</h2>

            <div class="access-granted-details" id="access-details"></div>

            <a class="access-link" href="#" id="view-device-link" onclick="viewDevice(); return false;">
                <i class="fas fa-map me-2"></i> View Device Location
            </a>

            <div class="expiration-warning" id="expiration-warning"></div>
        </div>

        <!-- Error Screen -->
        <div class="error-screen" id="error-screen">
            <div class="error-icon">
                <i class="fas fa-times-circle"></i>
            </div>
            <h2 id="error-title">Access Denied</h2>
            <p id="error-message"></p>
            <button class="back-button" onclick="resetForm()">
                <i class="fas fa-arrow-left me-2"></i> Try Again
            </button>
        </div>
    </div>

    <script>
        // =====================================================================
        // GLOBALS
        // =====================================================================

        let currentShare = null;
        let deviceId = null;

        // =====================================================================
        // FORM SUBMISSION
        // =====================================================================

        async function submitShareCode() {
            const shareCode = document.getElementById('share-code').value.trim().toUpperCase();
            const password = document.getElementById('share-password').value;

            if (!shareCode) {
                showInfo('Please enter a share code', 'error');
                return;
            }

            const button = event.target;
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Verifying...';

            try {
                const response = await fetch(`/api/findmy/share/${shareCode}/access`);
                const data = await response.json();

                if (!data.success) {
                    if (response.status === 410) {
                        showError('Share Expired', 'This share code has expired. Please ask the device owner for a new code.');
                    } else if (response.status === 404) {
                        showError('Invalid Code', 'The share code you entered is not valid. Please check and try again.');
                    } else {
                        showError('Access Denied', data.error || 'Unable to access this device.');
                    }
                    button.disabled = false;
                    button.innerHTML = '<i class="fas fa-arrow-right me-2"></i> Access Device';
                    return;
                }

                currentShare = data;
                deviceId = data.device_id;

                // Check expiration
                if (data.expires_at) {
                    const expiresAt = new Date(data.expires_at);
                    const now = new Date();
                    const hoursRemaining = Math.floor((expiresAt - now) / (1000 * 60 * 60));

                    if (hoursRemaining < 24) {
                        const warning = document.getElementById('expiration-warning');
                        warning.innerHTML = `<i class="fas fa-clock me-2"></i> This access will expire in ${hoursRemaining} hours`;
                        warning.classList.add('show');
                    }
                }

                showGranted(data);

            } catch (error) {
                console.error('Error:', error);
                showError('Connection Error', 'Failed to verify share code. Please try again.');
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-arrow-right me-2"></i> Access Device';
            }
        }

        // =====================================================================
        // UI STATES
        // =====================================================================

        function showInfo(message, type = 'info') {
            const box = document.getElementById('info-box');
            box.textContent = message;
            box.className = `info-box show ${type === 'error' ? 'error' : 'success'}`;
            setTimeout(() => box.classList.remove('show'), 5000);
        }

        function showGranted(data) {
            document.getElementById('access-form-section').style.display = 'none';
            document.getElementById('error-screen').classList.remove('show');
            document.getElementById('access-granted-section').classList.add('show');

            // Populate details
            const permissions = {
                'view_only': '📍 View Location',
                'view_and_alert': '📍 View Location, 🔔 Trigger Alarm',
                'full_control': '📍 View Location, 🔔 Alarm, 🔒 Lock/Unlock'
            };

            const details = document.getElementById('access-details');
            details.innerHTML = `
                <div class="detail-item">
                    <span class="detail-label">Device:</span>
                    <span class="detail-value">#${data.device_id}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Access Level:</span>
                    <span class="detail-value">${permissions[data.permission_level] || 'View Only'}</span>
                </div>
                ${data.expires_at ? `
                    <div class="detail-item">
                        <span class="detail-label">Expires:</span>
                        <span class="detail-value">${new Date(data.expires_at).toLocaleDateString()}</span>
                    </div>
                ` : ''}
            `;
        }

        function showError(title, message) {
            document.getElementById('access-form-section').style.display = 'none';
            document.getElementById('access-granted-section').classList.remove('show');
            document.getElementById('error-screen').classList.add('show');
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = message;
        }

        function resetForm() {
            document.getElementById('share-code').value = '';
            document.getElementById('share-password').value = '';
            document.getElementById('access-form-section').style.display = 'block';
            document.getElementById('access-granted-section').classList.remove('show');
            document.getElementById('error-screen').classList.remove('show');
            document.getElementById('share-code').focus();
        }

        // =====================================================================
        // NAVIGATION
        // =====================================================================

        function viewDevice() {
            if (!currentShare) return;
            
            const url = `/findmy/viewer?device_id=${deviceId}&token=${currentShare.share_token}`;
            window.location.href = url;
        }

        // =====================================================================
        // INIT
        // =====================================================================

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('share-code').focus();
        });

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('access-form-section').style.display !== 'none') {
                submitShareCode();
            }
        });
    </script>
</body>
</html>
