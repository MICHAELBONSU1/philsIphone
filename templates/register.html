<!-- templates/register.html -->
{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join Phil's iPhone today</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="role-selector">
                <input type="radio" name="role" value="customer" id="role-customer" checked>
                <label for="role-customer"><i class="fas fa-user"></i> Customer</label>

                <input type="radio" name="role" value="rider" id="role-rider">
                <label for="role-rider"><i class="fas fa-motorcycle"></i> Rider</label>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter username">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="Repeat password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>

<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
    .auth-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .auth-card h2 { text-align: center; margin-bottom: 5px; color: #333; }
    .auth-subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9rem; }
    .role-selector { display: flex; gap: 10px; margin-bottom: 25px; background: #f0f2f5; padding: 5px; border-radius: 10px; }
    .role-selector input { display: none; }
    .role-selector label { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: 600; font-size: 0.9rem; margin-bottom: 0; }
    .role-selector input:checked + label { background: #007bff; color: white; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
    .form-group label { font-weight: 600; font-size: 0.85rem; color: #555; }
    .btn-block { width: 100%; padding: 12px; font-weight: 600; margin-top: 10px; border-radius: 10px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
</style>
{% endblock %}
